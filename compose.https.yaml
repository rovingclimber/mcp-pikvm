services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - pikvm-mcp
    env_file:
      - ./secrets/pikvm-mcp.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:
  caddy_config:
