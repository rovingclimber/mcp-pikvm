# Optional HTTPS overlay. First edit the CHANGE ME values below, then run:
# docker compose -f compose.yaml -f compose.https.yaml up -d
services:
  pikvm-mcp:
    labels:
      traefik.enable: "true"
      # CHANGE ME: use the same DNS name in this rule and allowed-host entry
      # in compose.yaml.
      traefik.http.routers.pikvm-mcp.rule: "Host(`mcp.example.com`)"
      traefik.http.routers.pikvm-mcp.entrypoints: websecure
      traefik.http.routers.pikvm-mcp.tls: "true"
      traefik.http.routers.pikvm-mcp.tls.certresolver: cloudflare
      traefik.http.services.pikvm-mcp.loadbalancer.server.port: "8000"

  traefik:
    image: traefik:v3
    restart: unless-stopped
    depends_on:
      - pikvm-mcp
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # CHANGE ME: certificate-renewal notification address.
      - --certificatesresolvers.cloudflare.acme.email=you@example.com
      - --certificatesresolvers.cloudflare.acme.storage=/data/acme.json
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
    environment:
      # CHANGE ME: Cloudflare token limited to Zone Read and DNS Edit.
      CF_DNS_API_TOKEN: "CHANGE-ME"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-data:/data
    security_opt:
      - no-new-privileges:true

volumes:
  traefik-data:
