services:
  pikvm-mcp:
    image: rovingclimber/mcp-pikvm:latest
    init: true
    restart: unless-stopped
    env_file:
      - .env
    # The ordinary setup is a trusted-LAN HTTP endpoint. Set this to your
    # server's LAN IP (or 0.0.0.0) only when that is intentional.
    ports:
      - "${MCP_BIND_ADDRESS:-127.0.0.1}:8000:8000"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
